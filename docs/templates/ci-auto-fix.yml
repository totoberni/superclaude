# Template: copy to <project>/.github/workflows/ and set ANTHROPIC_API_KEY secret
# Adapted from upstream awesome-claude-code ci-failure-auto-fix.yml
#
# Prerequisites:
#   1. Set ANTHROPIC_API_KEY as a repository secret
#   2. Update the "workflows" list below to match your CI workflow name
#   3. Adjust claude_args tool list for your project's stack
#
# Guard: the `!startsWith` condition prevents infinite loops where
# a fix branch's own CI failure triggers another fix attempt.

name: Auto Fix CI Failures

on:
  workflow_run:
    workflows: ["CI"]  # <-- Update to match your CI workflow name
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read
  issues: write
  id-token: write

jobs:
  auto-fix:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0] &&
      !startsWith(github.event.workflow_run.head_branch, 'claude-auto-fix-ci-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - name: Create fix branch
        id: branch
        run: |
          BRANCH_NAME="claude-auto-fix-ci-${{ github.event.workflow_run.head_branch }}-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Get CI failure details
        id: failure_details
        uses: actions/github-script@v7
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });

            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });

            const failedJobs = jobs.data.jobs.filter(job => job.conclusion === 'failure');

            let errorLogs = [];
            for (const job of failedJobs) {
              const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                job_id: job.id
              });
              errorLogs.push({
                jobName: job.name,
                logs: logs.data
              });
            }

            return {
              runUrl: run.data.html_url,
              failedJobs: failedJobs.map(j => j.name),
              errorLogs: errorLogs
            };

      - name: Fix CI failures with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            The CI pipeline has failed. Analyze the error logs, identify the root cause,
            and implement a fix. Do NOT introduce test weakening (no added skips, no
            loosened assertions).

            Failed CI Run: ${{ fromJSON(steps.failure_details.outputs.result).runUrl }}
            Failed Jobs: ${{ join(fromJSON(steps.failure_details.outputs.result).failedJobs, ', ') }}
            PR Number: ${{ github.event.workflow_run.pull_requests[0].number }}
            Branch: ${{ steps.branch.outputs.branch_name }}
            Base Branch: ${{ github.event.workflow_run.head_branch }}
            Repository: ${{ github.repository }}

            Error logs:
            ${{ toJSON(fromJSON(steps.failure_details.outputs.result).errorLogs) }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools 'Edit,Write,Read,Glob,Grep,Bash(git:*),Bash(npm:*),Bash(npx:*),Bash(python3:*),Bash(pip:*)'"

      - name: Push fix branch and create PR
        if: success()
        run: |
          git push origin "${{ steps.branch.outputs.branch_name }}"
          gh pr create \
            --title "fix(ci): auto-fix CI failure on ${{ github.event.workflow_run.head_branch }}" \
            --body "Automated fix for CI failure in workflow run [${{ github.event.workflow_run.id }}](${{ fromJSON(steps.failure_details.outputs.result).runUrl }}).

          **Failed jobs**: ${{ join(fromJSON(steps.failure_details.outputs.result).failedJobs, ', ') }}

          Generated by Claude Code CI auto-fix." \
            --base "${{ github.event.workflow_run.head_branch }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

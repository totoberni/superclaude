# GitHub Actions CI template for Python projects with pytest
# Usage: copy to .github/workflows/ci.yml and adjust as needed
#
# Features: pytest + optional ruff/mypy, Python 3.11+3.12 matrix
# Note: example-project needs PyTorch extra-index-url (see commented section)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          # Uncomment for linting:
          # pip install ruff mypy

          # For PyTorch projects (e.g., example-project):
          # pip install torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: |
          pytest --tb=short --co -q  # dry-run: verify collection
          pytest -v --cov --cov-report=term-missing

      # Uncomment for linting:
      # - name: Lint with ruff
      #   run: ruff check .

      # - name: Type check with mypy
      #   run: mypy --ignore-missing-imports .

# SYNTHETIC SSOT mirroring the real schema v1.4 key structure (W4 3.2 tests).
# Every value here is invented placeholder data. NO real PII: this fixture must
# never carry real identikit content (PII firewall, spec constraints).
identity:
  name: Test Candidate
  email: test.candidate@example.invalid
  current_location: "Lisbon, Portugal"
work_authorization: "EU citizen; full EU work rights, no visa sponsorship needed"
education:
  - degree: BSc Computer Science
    institution: Example University
    year: 2025
# W4 matching redesign: the seniority gate anchors on this explicit experience
# total (entry-level, ~1.7 yrs), NEVER on the target-role names (the old
# self-inflation bug). Fake value only; the real number is seeded on toto.
experience_years: 1.7
experience:
  - "Built a synthetic backend service in Python for a demo project"
  - "Shipped a toy machine learning model with PyTorch for coursework"
links:
  github: https://example.invalid/testcandidate
  site: https://example.invalid
preferences:
  target_roles:
    - Senior Backend Engineer
    - Machine Learning Engineer
    - Graduate Software Engineer
  target_locations:
    - "Lisbon, Portugal"
    - "Remote (EU)"
    - "London, UK"
  remote: "Open to fully remote roles within the EU"
  comp_floor: "EUR 47,000 gross annual (RAL)"
  excludes:
    - unpaid
    - commission only
  # W4-COMMUTE-GATE (7.3 D5): placeholder location policy structure only. Real
  # values live in the toto-only, gitignored ssot/job.yaml, never here.
  location_policy:
    allowed_cities:
      - Lisbon
      - London
    max_onsite_days_per_week_europe: 2
    max_onsite_days_per_month_rest: 4
skills:
  programming_languages:
    - Python
    - TypeScript
    - C++
  frameworks_libraries:
    - PyTorch
    - React
  tools_platforms:
    - SQLite
    - Docker
  domains:
    - machine learning
    - backend
  # W4 matching redesign: canonical short skill tags for the matcher (kept
  # ALONGSIDE the verbose blocks above, which stay for cover-letter drafting).
  skill_tokens:
    - python
    - typescript
    - cpp
    - pytorch
    - react
    - sqlite
    - docker
canned_answers:
  notice_period: "1 month"
  visa_sponsorship_required: "no"
  optional_consents: "yes, consents to the privacy policy and data processing"

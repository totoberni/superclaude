# notebook-skill hooks — append/merge into your project's .pre-commit-config.yaml.
# Order is load-bearing: nbstripout → ruff (.py only) → jupytext --sync → validators.
# `ruff format <ipynb>` is FORBIDDEN in paired-mode projects (skill writes .ipynb,
# next jupytext --sync overwrites ruff's mutations based on mtime).

repos:
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
        # Per W4: type-based filtering (0.9.0+) is finer than --max-size.
        args:
          - --keep-output-type
          - text/plain
          - --keep-output-type
          - application/json
          - --keep-metadata-keys
          - cell.metadata.tags
          - --keep-metadata-keys
          - cell.metadata.keep_output

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff-format
        types_or: [python]
        exclude: \.ipynb$  # paired-mode: ruff on .py only
      - id: ruff
        args: [--fix]
        types_or: [python]
        exclude: \.ipynb$

  - repo: https://github.com/mwouts/jupytext
    rev: v1.16.4
    hooks:
      - id: jupytext
        args: [--sync]
        files: \.(py|ipynb)$

  - repo: local
    hooks:
      - id: notebook-validate
        name: /notebook validate
        entry: bash -c 'for nb in "$@"; do ~/.claude/skills/notebook/notebook validate "$nb" || exit 1; done' --
        language: system
        files: \.ipynb$
        pass_filenames: true
      - id: notebook-audit
        name: /notebook audit
        entry: bash -c 'for nb in "$@"; do ~/.claude/skills/notebook/notebook audit "$nb" || exit 1; done' --
        language: system
        files: \.ipynb$
        pass_filenames: true

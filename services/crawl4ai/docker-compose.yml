# Crawl4AI (Apache-2.0) ‚Äî local crawl‚Üímarkdown backend for the /better-super skill.
# API on 127.0.0.1:11235 ‚Äî POST /md {"url":...} ¬∑ POST /crawl {"urls":[...]} ¬∑ GET /health ¬∑ GET /playground
services:
  crawl4ai:
    image: unclecode/crawl4ai:latest        # most-recent stable; pin to a specific Docker Hub tag once confirmed
    container_name: crawl4ai
    ports:
      - "127.0.0.1:11235:11235"             # localhost-only ‚Äî service has NO auth, so don't expose on the LAN
    volumes:
      - /dev/shm:/dev/shm                   # Chromium shared memory (per official compose)
    user: appuser
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
